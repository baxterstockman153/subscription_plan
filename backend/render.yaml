services:
  - type: web
    name: subscription-plan-backend
    env: node
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: subscription-plan-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: subscription-plan-db
    databaseName: subscription_plan
    user: subscription_plan_user
    plan: free
